name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend image
        run: |
          docker build \
            --build-arg NODE_MAX_OLD_SPACE_SIZE=2048 \
            --build-arg REACT_APP_API_URL="${REACT_APP_API_URL}" \
            --build-arg REACT_APP_CHAT_URL="${REACT_APP_CHAT_URL}" \
            --build-arg REACT_APP_MODEL_SERVICE_URL="${REACT_APP_MODEL_SERVICE_URL}" \
            --build-arg REACT_APP_WXPAY_URL="${REACT_APP_WXPAY_URL}" \
            --build-arg REACT_APP_GOBACK_URL="${REACT_APP_GOBACK_URL}" \
            --build-arg REACT_APP_COZE_API_URL="${REACT_APP_COZE_API_URL}" \
            --build-arg REACT_APP_COZE_TOKEN="${REACT_APP_COZE_TOKEN}" \
            --build-arg REACT_APP_COZE_BOT_ID_KEYWORD="${REACT_APP_COZE_BOT_ID_KEYWORD}" \
            --build-arg REACT_APP_COZE_BOT_ID_TEMPLATE="${REACT_APP_COZE_BOT_ID_TEMPLATE}" \
            --build-arg REACT_APP_EXTENSION_DOWNLOAD_URL="${REACT_APP_EXTENSION_DOWNLOAD_URL}" \
            --build-arg REACT_APP_XHS_BASE_URL="${REACT_APP_XHS_BASE_URL}" \
            --build-arg REACT_APP_DOCS_URL="${REACT_APP_DOCS_URL}" \
            --build-arg REACT_APP_EXTENSION_TUTORIAL_URL="${REACT_APP_EXTENSION_TUTORIAL_URL}" \
            --build-arg REACT_APP_MESSAGE_PROGRAM_DOWNLOAD_URL="${REACT_APP_MESSAGE_PROGRAM_DOWNLOAD_URL}" \
            --build-arg REACT_APP_LOGIN_BG_IMAGE_URL="${REACT_APP_LOGIN_BG_IMAGE_URL}" \
            --build-arg REACT_APP_UPLOAD_FORMAT_IMAGE_URL="${REACT_APP_UPLOAD_FORMAT_IMAGE_URL}" \
            -t ultra-ai-frontend:latest .
        env:
          REACT_APP_API_URL: ${{ vars.REACT_APP_API_URL }}
          REACT_APP_CHAT_URL: ${{ vars.REACT_APP_CHAT_URL }}
          REACT_APP_MODEL_SERVICE_URL: ${{ vars.REACT_APP_MODEL_SERVICE_URL }}
          REACT_APP_WXPAY_URL: ${{ vars.REACT_APP_WXPAY_URL }}
          REACT_APP_GOBACK_URL: ${{ vars.REACT_APP_GOBACK_URL }}
          REACT_APP_COZE_API_URL: ${{ vars.REACT_APP_COZE_API_URL }}
          REACT_APP_COZE_TOKEN: ${{ secrets.REACT_APP_COZE_TOKEN }}
          REACT_APP_COZE_BOT_ID_KEYWORD: ${{ vars.REACT_APP_COZE_BOT_ID_KEYWORD }}
          REACT_APP_COZE_BOT_ID_TEMPLATE: ${{ vars.REACT_APP_COZE_BOT_ID_TEMPLATE }}
          REACT_APP_EXTENSION_DOWNLOAD_URL: ${{ vars.REACT_APP_EXTENSION_DOWNLOAD_URL }}
          REACT_APP_XHS_BASE_URL: ${{ vars.REACT_APP_XHS_BASE_URL }}
          REACT_APP_DOCS_URL: ${{ vars.REACT_APP_DOCS_URL }}
          REACT_APP_EXTENSION_TUTORIAL_URL: ${{ vars.REACT_APP_EXTENSION_TUTORIAL_URL }}
          REACT_APP_MESSAGE_PROGRAM_DOWNLOAD_URL: ${{ vars.REACT_APP_MESSAGE_PROGRAM_DOWNLOAD_URL }}
          REACT_APP_LOGIN_BG_IMAGE_URL: ${{ vars.REACT_APP_LOGIN_BG_IMAGE_URL }}
          REACT_APP_UPLOAD_FORMAT_IMAGE_URL: ${{ vars.REACT_APP_UPLOAD_FORMAT_IMAGE_URL }}

      - name: Export image archive
        run: docker save ultra-ai-frontend:latest | gzip > ultra-ai-frontend.tar.gz

      - name: Upload image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          source: ultra-ai-frontend.tar.gz
          target: /tmp

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          script: |
            set -euo pipefail
            export PROJECT_DIR="${{ secrets.DEPLOY_FRONTEND_PROJECT_DIR }}"
            export BRANCH="main"
            cd "${PROJECT_DIR}"
            git fetch origin "${BRANCH}"
            git checkout "${BRANCH}"
            git reset --hard "origin/${BRANCH}"
            docker load -i /tmp/ultra-ai-frontend.tar.gz
            export FORCE_GIT_SYNC="0"
            export PREBUILT_FRONTEND_IMAGE="1"
            export PUBLIC_FRONTEND_URL="https://ultra-ai.site"
            chmod +x "${PROJECT_DIR}/scripts/deploy_frontend.sh"
            "${PROJECT_DIR}/scripts/deploy_frontend.sh"

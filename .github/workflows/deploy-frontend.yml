name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          script: |
            export PROJECT_DIR="${{ secrets.DEPLOY_FRONTEND_PROJECT_DIR }}"
            export BRANCH="main"
            export FORCE_GIT_SYNC="1"
            export NO_CACHE_BUILD="0"
            export NODE_MAX_OLD_SPACE_SIZE="768"
            chmod +x "${PROJECT_DIR}/scripts/deploy_frontend.sh"
            "${PROJECT_DIR}/scripts/deploy_frontend.sh"

# HTTP server - 重定向到 HTTPS
server {
    listen 80;
    server_name ultra-ai.site www.ultra-ai.site;
    
    # 将所有 HTTP 请求重定向到 HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name ultra-ai.site www.ultra-ai.site;

    # SSL 证书配置 - Let's Encrypt 证书路径
    ssl_certificate /etc/letsencrypt/live/ultra-ai.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ultra-ai.site/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 前端静态文件目录
    # 部署时请确保将 build 目录下的文件复制到此目录，或者修改此路径指向你的 build 目录
    root /usr/share/nginx/html;
    index index.html;

    # 开启 gzip 压缩
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/x-javascript application/xml;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    location / {
        # 解决单页应用(SPA)路由刷新 404 问题
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存设置
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 如果需要反向代理后端 API，可以取消以下注释并修改地址
    # location /api/ {
    #     proxy_pass http://localhost:3001/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}

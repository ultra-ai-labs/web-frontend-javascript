services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
        REACT_APP_CHAT_URL: ${REACT_APP_CHAT_URL}
        REACT_APP_MODEL_SERVICE_URL: ${REACT_APP_MODEL_SERVICE_URL}
        REACT_APP_WXPAY_URL: ${REACT_APP_WXPAY_URL}
        REACT_APP_GOBACK_URL: ${REACT_APP_GOBACK_URL}
        REACT_APP_COZE_API_URL: ${REACT_APP_COZE_API_URL}
        REACT_APP_COZE_TOKEN: ${REACT_APP_COZE_TOKEN}
        REACT_APP_COZE_BOT_ID_KEYWORD: ${REACT_APP_COZE_BOT_ID_KEYWORD}
        REACT_APP_COZE_BOT_ID_TEMPLATE: ${REACT_APP_COZE_BOT_ID_TEMPLATE}
        REACT_APP_EXTENSION_DOWNLOAD_URL: ${REACT_APP_EXTENSION_DOWNLOAD_URL}
        REACT_APP_XHS_BASE_URL: ${REACT_APP_XHS_BASE_URL}
        REACT_APP_DOCS_URL: ${REACT_APP_DOCS_URL}
        REACT_APP_EXTENSION_TUTORIAL_URL: ${REACT_APP_EXTENSION_TUTORIAL_URL}
        REACT_APP_MESSAGE_PROGRAM_DOWNLOAD_URL: ${REACT_APP_MESSAGE_PROGRAM_DOWNLOAD_URL}
        REACT_APP_LOGIN_BG_IMAGE_URL: ${REACT_APP_LOGIN_BG_IMAGE_URL}
        REACT_APP_UPLOAD_FORMAT_IMAGE_URL: ${REACT_APP_UPLOAD_FORMAT_IMAGE_URL}
        NODE_MAX_OLD_SPACE_SIZE: ${NODE_MAX_OLD_SPACE_SIZE:-768}
    image: ultra-ai-frontend:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # 挂载Let's Encrypt证书到容器
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # 如果需要更新nginx配置，可以挂载配置文件
      # - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
